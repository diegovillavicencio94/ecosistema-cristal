version: "3.8"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: ecosistema-cristal-qdrant
    ports:
      - "6333:6333"   # REST API + Dashboard web
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT__LOG_LEVEL=INFO
    restart: unless-stopped

volumes:
  qdrant_storage:
